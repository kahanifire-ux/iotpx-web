<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOTPX - Premium Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="auth-screen" style="display: block; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px;">
        <div class="auth-card" style="background: #161f32; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;">
            <i class="fa-solid fa-bolt" style="font-size: 3rem; color: #3b82f6; margin-bottom: 15px;"></i>
            <h2 style="color: #fff; margin-bottom: 20px;">iOTPX HUB</h2>
            
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 5px;">Gmail Address</label>
                <input type="email" id="auth-email" placeholder="example@gmail.com" style="width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; color: #fff;">
            </div>
            
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 5px;">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" style="width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; color: #fff;">
            </div>
            
            <button type="button" onclick="handleAuth()" style="width: 100%; padding: 14px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
                Sign In / Register
            </button>
        </div>
    </div>

    <div id="app-screen" style="display: none; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h3 id="user-display-email" style="color: #fff; margin: 0;">user@gmail.com</h3>
                <span style="color: #10b981; font-size: 0.8rem;">Balance: ₹<span id="user-balance">0.00</span></span>
            </div>
            <button id="admin-toggle-btn" style="padding: 8px 12px; background: rgba(236, 72, 153, 0.2); color: #ec4899; border: 1px solid #ec4899; border-radius: 8px; display: none;" onclick="switchView('admin')">Admin Panel</button>
        </header>

        <div id="user-view" style="display: block;">
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
                <div style="background: #161f32; padding: 20px; border-radius: 12px; text-align: center;" onclick="alert('OTP Action Triggered')">🛒 GET OTP</div>
                <div style="background: #161f32; padding: 20px; border-radius: 12px; text-align: center;" onclick="alert('Deposit Triggered')">💰 DEPOSIT</div>
            </div>
        </div>

        <div id="admin-view" style="display: none;">
            <h4 style="color: #ec4899;">👑 Master Admin Control</h4>
            <button style="padding: 8px; background: #334155; color: #fff; border: none; border-radius: 5px; margin-bottom: 15px;" onclick="switchView('user')">Back to User Mode</button>
            <div style="background: #0e1422; padding: 15px; border-radius: 12px; color: #fff;">
                <p>Admin Operations Ready...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
